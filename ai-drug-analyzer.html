<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Drug Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #f7f8f5; color: #1d2522; }
    .shell { width: min(1020px, calc(100% - 40px)); margin: 0 auto; padding: 28px 0; }
    header { padding: 18px 0; border-bottom: 1px solid #e6e9e4; background: #fff; }
    .brand { font-weight: 700; display: inline-flex; align-items: center; gap: 12px; }
    main { padding: 40px 0; }
    .card { background: #fff; padding: 24px; border-radius: 10px; border: 1px solid #e6e9e4; box-shadow: 0 8px 20px rgba(26,39,34,0.04); }
    .title { font-size: 1.6rem; margin: 0 0 12px 0; }
    textarea { width: 100%; min-height: 180px; padding: 12px; border: 1px solid #d9ded7; border-radius: 8px; font-size: 0.95rem; }
    .controls { display:flex; gap:8px; margin-top:12px; }
    .btn { padding: 10px 14px; border-radius:8px; border: none; cursor: pointer; font-weight:600; }
    .btn.primary { background: #126a5b; color: #fff; }
    .btn.secondary { background: transparent; border: 1px solid #d9ded7; }
    .result { margin-top:16px; color:#34413c; }
  </style>
</head>
<body>
  <header>
    <div class="shell">
      <a class="brand" href="index.html" aria-label="Home">AI Drug Analyzer — Back</a>
    </div>
  </header>

  <main class="shell">
    <section class="card">
      <h1 class="title">AI Drug Analyzer</h1>
      <p>Paste drug information or a description below and click <strong>Analyze</strong>.</p>
      <textarea id="input" placeholder="Enter drug text, e.g. name, ingredients, or description..."></textarea>
      <div class="controls">
        <button class="btn primary" id="analyze">Analyze</button>
        <button class="btn secondary" id="clear">Clear</button>
      </div>
      <div class="result" id="result" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const analyzeBtn = document.getElementById('analyze');
    const clearBtn = document.getElementById('clear');
    const input = document.getElementById('input');
    const result = document.getElementById('result');

    analyzeBtn.addEventListener('click', () => {
      const v = input.value.trim();
      if (!v) { result.textContent = 'Please enter some text to analyze.'; return; }
      result.textContent = 'Placeholder analysis: ' + v.slice(0, 200) + (v.length>200? '...':'' );
    });

    clearBtn.addEventListener('click', () => { input.value=''; result.textContent=''; });
  </script>
</body>
</html>
